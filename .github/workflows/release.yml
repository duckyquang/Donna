name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build donna-server sidecar
        shell: bash
        run: bash scripts/build-sidecar.sh ${{ matrix.target }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Donna ${{ github.ref_name }}"
          releaseBody: |
            ### Which file do I download?

            | Your computer | Download this |
            | --- | --- |
            | Mac · Apple Silicon (M1–M4) | the `aarch64.dmg` file |
            | Mac · Intel | the `x64.dmg` file |
            | Windows | the `x64-setup.exe` file |
            | Linux | the `.AppImage` file (or `.deb` / `.rpm` for your distro) |

            Or skip this page entirely — the download button at https://duckyquang.github.io/Donna/ picks the right file for you.

            macOS says Donna is “damaged”? Run `xattr -cr /Applications/Donna.app` in Terminal once — that clears the quarantine flag on unsigned apps.

            Prefer zero dialogs on macOS? Install from Terminal instead: `curl -fsSL https://duckyquang.github.io/Donna/install.sh | sh`

            Everything else here (`.sig`, `latest.json`, `.app.tar.gz`) powers Donna's built-in auto-updater; you can ignore it.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
