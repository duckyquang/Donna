[package]
name = "donna-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "donna-server"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["clock"] }
chrono-tz = "0.9"
